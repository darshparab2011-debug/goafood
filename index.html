<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Goa Fresh · Food Delivery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: #0f1419;
      color: #eef2f5;
      padding: 0 0 120px;
    }

    .app-bar {
      background: rgba(18, 26, 32, 0.95);
      backdrop-filter: blur(20px);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #3a4a54;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(145deg, #ffb281, #f5a56b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand span {
      background: #423d38;
      color: #ffdbb5;
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 40px;
      border: 1px solid #b27b54;
      margin-left: 8px;
    }

    .location-chip {
      background: #262e34;
      border-radius: 60px;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #efdbcd;
      border: 1px solid #5f5a53;
      font-size: 0.95rem;
    }

    .location-chip strong {
      background: #c47642;
      color: #010101;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
    }

    .status-section {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1e2a31dd;
      padding: 6px 16px;
      border-radius: 60px;
      border: 1px solid #4a5a64;
    }

    .online-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      height: 12px;
      width: 12px;
      border-radius: 20px;
      background: #43b581;
      box-shadow: 0 0 0 3px rgba(67, 181, 129, 0.35);
    }

    .dot.offline {
      background: #7f8d9c;
    }

    .owner-btn {
      background: #2d3c45;
      border: none;
      padding: 6px 14px;
      border-radius: 40px;
      color: #fcd7b3;
      cursor: pointer;
      border: 1px solid #7a6e5f;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 25px 20px;
      max-width: 1300px;
      margin: 0 auto;
    }

    .food-card {
      background: #1f2a31;
      border-radius: 32px;
      overflow: hidden;
      border: 1px solid #3b4b56;
      transition: transform 0.2s;
    }

    .food-card:hover {
      transform: translateY(-4px);
    }

    .card-image {
      height: 180px;
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 12px;
    }

    .price-badge {
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 800;
      font-size: 1.5rem;
      color: #fec195;
      border: 1px solid #c07c51;
    }

    .card-content {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-content h3 {
      font-size: 1.4rem;
      color: #f2e1d4;
    }

    .add-btn {
      background: #2d4d5a;
      border: none;
      color: #ffebdb;
      font-weight: 600;
      padding: 14px;
      border-radius: 60px;
      cursor: pointer;
      font-size: 1rem;
      border: 1px solid #608b92;
    }

    .custom-wrap {
      max-width: 800px;
      margin: 20px auto;
      padding: 0 20px;
    }

    .custom-card {
      background: #1f2b33;
      border-radius: 30px;
      padding: 20px 25px;
      border: 2px solid #4e565c;
    }

    .custom-card h3 {
      font-size: 1.3rem;
      color: #ffb687;
      margin-bottom: 12px;
    }

    .custom-row {
      display: flex;
      gap: 10px;
    }

    .custom-row input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #4e5e68;
      border-radius: 60px;
      background: #1f2f38;
      color: white;
      font-size: 1rem;
    }

    .custom-row input:focus {
      outline: none;
      border-color: #d28d58;
    }

    .custom-row button {
      background: #a66942;
      border: none;
      color: white;
      font-weight: 600;
      padding: 0 28px;
      border-radius: 60px;
      font-size: 1rem;
      cursor: pointer;
    }

    .address-bar {
      max-width: 800px;
      margin: 20px auto;
      padding: 0 20px;
    }

    .address-card {
      background: #1b2932;
      border-radius: 30px;
      padding: 20px 25px;
      border: 2px solid #786c5e;
    }

    .address-card label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fccca1;
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .address-card input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #5c6e7c;
      border-radius: 60px;
      background: #11212b;
      color: white;
      font-size: 1rem;
    }

    .address-card input:focus {
      outline: none;
      border-color: #e29d6b;
    }

    #cart {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(10, 18, 24, 0.95);
      backdrop-filter: blur(20px);
      padding: 15px 25px;
      border-top-left-radius: 30px;
      border-top-right-radius: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 2px solid #c24e1a;
      z-index: 1000;
    }

    .cart-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .cart-icon {
      background: #bb784b;
      padding: 10px 18px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.2rem;
      color: #0f0f0f;
    }

    .cart-details {
      font-size: 1.1rem;
    }

    .cart-details span {
      color: #ffca9e;
      font-weight: 700;
      font-size: 1.3rem;
    }

    .order-btn {
      background: #d38f5c;
      border: none;
      color: #151515;
      font-weight: 700;
      padding: 12px 30px;
      border-radius: 60px;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .empty-cart {
      text-align: center;
      color: #a2b1bc;
      font-style: italic;
      padding: 40px;
    }

    .admin-panel {
      max-width: 800px;
      margin: 20px auto;
      padding: 0 20px;
    }

    .admin-card {
      background: #1f2b33;
      border-radius: 30px;
      padding: 25px;
      border: 2px solid #c24e1a;
      display: none;
    }

    .admin-card h3 {
      color: #fac89d;
      font-size: 1.4rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .admin-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 15px;
    }

    .admin-row input {
      flex: 1 1 200px;
      padding: 12px 16px;
      background: #12212b;
      border: 2px solid #4d6572;
      border-radius: 60px;
      color: white;
    }

    .admin-btn {
      background: #b37648;
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
    }

    .save-btn {
      background: #3c8d7c;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-card {
      background: #1d2a33;
      max-width: 340px;
      width: 90%;
      padding: 30px;
      border-radius: 40px;
      text-align: center;
      border: 2px solid #856e58;
    }

    .modal-card h3 {
      color: #fad8b6;
      font-size: 1.8rem;
      margin-bottom: 20px;
    }

    .modal-card input {
      width: 100%;
      padding: 15px 20px;
      border: 2px solid #73645a;
      border-radius: 60px;
      background: #16232b;
      color: white;
      margin-bottom: 20px;
    }

    .modal-actions button {
      background: #9f6f4b;
      border: none;
      color: white;
      padding: 12px 25px;
      border-radius: 60px;
      font-weight: 600;
      margin: 0 8px;
      cursor: pointer;
    }

    .modal-actions button.cancel {
      background: #43555f;
    }
  </style>
</head>
<body>

<div class="app-bar">
  <div class="brand">
    <h1>goa fresh</h1>
    <span>delivery</span>
  </div>
  <div class="location-chip">
    <i>📍</i> Kasa Amora <strong>only</strong>
  </div>
  <div class="status-section">
    <div class="online-indicator">
      <div class="dot" id="statusDot"></div>
      <div class="status-text" id="statusText">online</div>
    </div>
    <button class="owner-btn" id="ownerBtn">🔒</button>
  </div>
</div>

<div class="menu-grid" id="menu"></div>

<div class="custom-wrap">
  <div class="custom-card">
    <h3>🍛 custom order</h3>
    <div class="custom-row">
      <input type="text" id="customInput" placeholder="eg: Chicken xacuti">
      <button id="customBtn">add</button>
    </div>
  </div>
</div>

<div class="address-bar">
  <div class="address-card">
    <label><i>📮</i> delivery address</label>
    <input type="text" id="address" placeholder="flat / house / landmark *">
  </div>
</div>

<div id="emptyCart" class="empty-cart">your cart is empty</div>

<div id="cart" style="display: none;">
  <div class="cart-info">
    <div class="cart-icon">🛒</div>
    <div class="cart-details">
      <span id="cartCount">0</span> items · ₹<span id="cartTotal">0</span>
    </div>
  </div>
  <button class="order-btn" onclick="placeOrder()">order</button>
</div>

<div class="admin-panel">
  <div class="admin-card" id="adminPanel">
    <h3>⚙️ admin panel</h3>
    <div class="admin-row">
      <input type="text" id="newName" placeholder="dish name">
      <input type="number" id="newPrice" placeholder="price">
      <input type="url" id="newImage" placeholder="image URL">
    </div>
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
      <button class="admin-btn" id="addBtn">➕ add item</button>
      <button class="admin-btn save-btn" id="saveBtn">💾 save to cloud</button>
    </div>
    <p style="color: #aaa; margin-top: 15px;">Changes save to cloud - all devices update on refresh!</p>
  </div>
</div>

<div class="modal-overlay" id="passwordModal">
  <div class="modal-card">
    <h3>🔐 owner</h3>
    <input type="password" id="password" placeholder="passcode">
    <div class="modal-actions">
      <button id="submitPass">confirm</button>
      <button class="cancel" id="cancelPass">cancel</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = "goaMenu";
  const OWNER_PHONE = "7030159762";
  const CORRECT_PASS = "1234";

  let foods = [];
  let cart = [];
  let isAdmin = false;

  function loadMenu() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        foods = JSON.parse(saved);
      } catch (e) {
        foods = [];
      }
    }
    
    if (!foods || foods.length === 0) {
      foods = [
        { name: "Goan Fish Curry", price: 250, img: "https://images.unsplash.com/photo-1559314809-0d155014e29e?w=400" },
        { name: "Chicken Noodles", price: 190, img: "https://images.unsplash.com/photo-1585032226651-759b368d7246?w=400" },
        { name: "Butter Chicken", price: 280, img: "https://images.unsplash.com/photo-1603894584373-5ac82b2ae398?w=400" }
      ];
    }
    renderMenu();
  }

  function saveMenu() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(foods));
    alert('✅ Menu saved! All devices will see changes on refresh.');
  }

  function renderMenu() {
    const menuDiv = document.getElementById('menu');
    menuDiv.innerHTML = '';
    
    foods.forEach((food, index) => {
      const card = document.createElement('div');
      card.className = 'food-card';
      card.innerHTML = `
        <div class="card-image" style="background-image: linear-gradient(0deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 60%), url('${food.img}');">
          <div class="price-badge">₹${food.price}</div>
        </div>
        <div class="card-content">
          <h3>${food.name}</h3>
          <button class="add-btn" onclick="addToCart(${index})">➕ add to cart</button>
          ${isAdmin ? `<button style="background:#c15541; border:none; color:white; padding:8px; border-radius:30px; margin-top:5px;" onclick="deleteItem(${index})">✕ delete</button>` : ''}
        </div>
      `;
      menuDiv.appendChild(card);
    });
  }

  window.deleteItem = function(index) {
    if (!isAdmin) return;
    if (confirm('Delete this item?')) {
      foods.splice(index, 1);
      saveMenu();
      renderMenu();
    }
  };

  window.addToCart = function(index) {
    const item = foods[index];
    const existing = cart.find(x => x.name === item.name);
    if (existing) {
      existing.qty++;
    } else {
      cart.push({ name: item.name, price: item.price, qty: 1 });
    }
    updateCart();
  };

  function updateCart() {
    if (cart.length === 0) {
      document.getElementById('cart').style.display = 'none';
      document.getElementById('emptyCart').style.display = 'block';
      return;
    }
    
    document.getElementById('cart').style.display = 'flex';
    document.getElementById('emptyCart').style.display = 'none';
    
    const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
    const count = cart.reduce((sum, i) => sum + i.qty, 0);
    
    document.getElementById('cartCount').innerText = count;
    document.getElementById('cartTotal').innerText = total;
  }

  document.getElementById('customBtn').onclick = function() {
    const text = document.getElementById('customInput').value || 'special';
    cart.push({ name: '✨ ' + text, price: 190, qty: 1 });
    updateCart();
    document.getElementById('customInput').value = '';
  };

  window.placeOrder = function() {
    const addr = document.getElementById('address').value;
    if (!addr) {
      alert('Please enter delivery address');
      return;
    }
    if (cart.length === 0) {
      alert('Cart is empty');
      return;
    }
    
    let msg = "🍛 *Goa Fresh Order*%0A";
    msg += `📍 ${addr}%0A`;
    msg += `📌 Kasa Amora only%0A%0A`;
    
    let total = 0;
    cart.forEach((item, i) => {
      const sub = item.price * item.qty;
      msg += `${i+1}. ${item.name} x${item.qty} - ₹${sub}%0A`;
      total += sub;
    });
    msg += `%0A──────────%0A*TOTAL*: ₹${total}`;
    
    window.open(`https://wa.me/${OWNER_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
  };

  document.getElementById('ownerBtn').onclick = function() {
    document.getElementById('passwordModal').style.display = 'flex';
  };

  document.getElementById('submitPass').onclick = function() {
    const pass = document.getElementById('password').value;
    if (pass === CORRECT_PASS) {
      isAdmin = true;
      document.getElementById('adminPanel').style.display = 'block';
      document.getElementById('passwordModal').style.display = 'none';
      document.getElementById('password').value = '';
      renderMenu();
    } else {
      alert('Wrong passcode');
    }
  };

  document.getElementById('cancelPass').onclick = function() {
    document.getElementById('passwordModal').style.display = 'none';
    document.getElementById('password').value = '';
  };

  document.getElementById('addBtn').onclick = function() {
    if (!isAdmin) return;
    
    const name = document.getElementById('newName').value;
    const price = parseFloat(document.getElementById('newPrice').value);
    const img = document.getElementById('newImage').value || 'https://images.unsplash.com/photo-1559314809-0d155014e29e?w=400';
    
    if (!name || !price) {
      alert('Enter name and price');
      return;
    }
    
    foods.push({ name, price, img });
    saveMenu();
    renderMenu();
    
    document.getElementById('newName').value = '';
    document.getElementById('newPrice').value = '';
    document.getElementById('newImage').value = '';
  };

  document.getElementById('saveBtn').onclick = function() {
    if (!isAdmin) return;
    saveMenu();
  };

  loadMenu();
  updateCart();
</script>
</body>
</html>
